version: '3.8'

services:
  medical-rag-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: tawkeed_api
    ports:
      - "8000:8000"
    volumes:
      - ../medical_qdrant_db:/app/medical_qdrant_db
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ../mlflow.db:/app/mlflow.db
    environment:
      - QDRANT_PATH=/app/medical_qdrant_db
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
